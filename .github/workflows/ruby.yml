name: Ruby

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        gemfile:
          - rails7.2
          - rails8.0
          - rails8.1
        ruby:
          - "3.3"
          - "3.4"
          - "4.0"
        backend:
          - active_record
          - mongoid
        devise:
          - "4.9.4"
          - "5.0.3"
        exclude:
          - gemfile: "rails8.0"
            devise: "4.9.4"
          - gemfile: "rails8.1"
            devise: "4.9.4"
          - ruby: "3.4"
            devise: "4.9.4"
          - ruby: "4.0"
            devise: "4.9.4"

    name: ${{ matrix.gemfile }}, ruby ${{ matrix.ruby }}, ${{ matrix.backend }}
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: gemfiles/${{ matrix.gemfile }}.gemfile
      BACKEND: ${{ matrix.backend }}
      DEVISE_VERSION: ${{ matrix.devise }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true
        ruby-version: ${{ matrix.ruby }}
    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.3.0
      if: ${{ matrix.backend == 'mongoid' }}
    - name: Run tests
      run: |
        bundle exec rake spec
